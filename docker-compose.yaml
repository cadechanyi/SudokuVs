services:
  realtime:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "3847:3847"
    volumes:
      - .:/app
      - realtime_node_modules:/app/node_modules
    env_file:
      - docker.env
    command:
      - sh
      - -c
      - |
        if [ ! -d node_modules/ws ]; then npm ci; fi
        exec npm run dev:ws

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    env_file:
      - docker.env
    environment:
      # Improves file watching when the app directory is bind-mounted (e.g. Docker Desktop).
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
    # Bind mount hides image node_modules; populate the named volume on first start.
    command:
      - sh
      - -c
      - |
        if [ ! -d node_modules/next ]; then npm ci; fi
        exec npm run dev -- --hostname 0.0.0.0 --port 3000

volumes:
  web_node_modules:
  realtime_node_modules:
